services:
  - type: web
    name: oafcodify-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node Server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
    healthCheckPath: /api/health
    # Auto-deploy from main branch
    branch: main
    # Health check configuration
    healthCheck:
      httpPath: /api/health
      interval: 30
      timeout: 10
      gracePeriod: 60
    # Instance configuration
    numInstances: 1
